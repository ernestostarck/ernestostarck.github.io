    <div class="container">
      <a class="navbar-brand fw-semibold text-uppercase small" routerLink="/">Portfolio</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Mostrar navegación">

      </button>
      <div class="collapse navbar-collapse" id="mainNav">

          <li class="nav-item"><a class="nav-link" routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Home</a></li>

</header>

<router-outlet></router-outlet>

<footer class="site-footer" aria-label="Pie de página">
  <div class="container page-main">
    <p class="footer-copy">&copy; {{ currentYear }} Portfolio - Ernesto Starck H.</p>
  </div>
</footer>

<button id="scrollTopBtn" class="scroll-top-btn" type="button" aria-label="Subir arriba" [class.show]="showScrollTop" (click)="scrollToTop()">&#8593;</button>
