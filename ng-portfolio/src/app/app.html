<header class="site-header">
  <nav class="navbar navbar-expand-md navbar-dark border-bottom shadow-sm" aria-label="Navegación principal">
    <div class="container">
      <a class="navbar-brand fw-semibold text-uppercase small" routerLink="/">Portfolio</a>
      <button class="navbar-toggler" type="button" (click)="toggleNav()" [attr.aria-expanded]="navOpen" aria-controls="mainNav" [attr.aria-label]="t('Mostrar navegación', 'Show navigation')">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="navbar-collapse" [class.open]="navOpen" id="mainNav">
        <ul class="navbar-nav ms-auto gap-lg-1">
          <li class="nav-item"><a class="nav-link" routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" (click)="closeNav()">{{ t('Home', 'Home') }}</a></li>
          <li class="nav-item"><a class="nav-link" routerLink="/sobre-mi" routerLinkActive="active" (click)="closeNav()">{{ t('Sobre mí', 'About') }}</a></li>
          <li class="nav-item"><a class="nav-link" routerLink="/proyectos" routerLinkActive="active" (click)="closeNav()">{{ t('Proyectos', 'Projects') }}</a></li>
          <li class="nav-item"><a class="nav-link" routerLink="/certificaciones" routerLinkActive="active" (click)="closeNav()">{{ t('Certificaciones', 'Certifications') }}</a></li>
          <li class="nav-item"><a class="nav-link" routerLink="/contacto" routerLinkActive="active" (click)="closeNav()">{{ t('Contacto', 'Contact') }}</a></li>
        </ul>

        <div class="toolbar-controls" aria-label="Theme and language controls">
          <button
            class="theme-toggle"
            type="button"
            (click)="toggleTheme()"
            [attr.aria-label]="t('Cambiar modo de color', 'Toggle color mode')"
            [attr.title]="t('Cambiar modo de color', 'Toggle color mode')"
          >
            <svg *ngIf="theme === 'dark'" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path d="M12 4.5a1 1 0 0 0 1-1V2a1 1 0 1 0-2 0v1.5a1 1 0 0 0 1 1Zm0 15a1 1 0 0 0-1 1V22a1 1 0 1 0 2 0v-1.5a1 1 0 0 0-1-1Zm7.5-6.5a1 1 0 0 0 0-2H18a1 1 0 1 0 0 2h1.5Zm-15 0a1 1 0 1 0 0-2H3a1 1 0 1 0 0 2h1.5Zm10.96 5.54a1 1 0 0 0 1.42 1.42l1.06-1.06a1 1 0 1 0-1.42-1.42l-1.06 1.06Zm-9.9-9.9a1 1 0 1 0 1.42 1.42l1.06-1.06A1 1 0 0 0 6.62 7.56L5.56 8.62Zm12.38 0-1.06-1.06a1 1 0 0 0-1.42 1.42l1.06 1.06a1 1 0 1 0 1.42-1.42Zm-9.9 9.9-1.06-1.06a1 1 0 1 0-1.42 1.42l1.06 1.06a1 1 0 0 0 1.42-1.42ZM12 7a5 5 0 1 0 0 10 5 5 0 0 0 0-10Zm0 2a3 3 0 1 1 0 6 3 3 0 0 1 0-6Z" />
            </svg>
            <svg *ngIf="theme === 'light'" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path d="M13.68 2.05a1 1 0 0 0-1.12 1.34 7.48 7.48 0 0 1-9.17 9.17 1 1 0 0 0-1.34 1.12A9.5 9.5 0 1 0 13.68 2.05Zm-8.9 12.5a9.48 9.48 0 0 0 10.77-10.77 7.5 7.5 0 1 1-10.77 10.77Z" />
            </svg>
          </button>

          <div class="lang-switch" role="group" [attr.aria-label]="t('Selector de idioma', 'Language switcher')">
            <button
              type="button"
              class="lang-btn"
              [class.active]="language === 'es'"
              (click)="setLanguage('es')"
              aria-label="Español"
              title="Español"
            >
              <span class="flag flag-es" aria-hidden="true"></span>
              <span>ES</span>
            </button>
            <button
              type="button"
              class="lang-btn"
              [class.active]="language === 'en'"
              (click)="setLanguage('en')"
              aria-label="English"
              title="English"
            >
              <span class="flag flag-gb" aria-hidden="true"></span>
              <span>EN</span>
            </button>
          </div>
        </div>
      </div>
    </div>
  </nav>
</header>

<router-outlet></router-outlet>

<footer class="site-footer" aria-label="Footer">
  <div class="container page-main">
    <p class="footer-copy">&copy; {{ currentYear }} {{ t('Portfolio', 'Portfolio') }} - Ernesto Starck H.</p>
  </div>
</footer>

<button id="scrollTopBtn" class="scroll-top-btn" type="button" [attr.aria-label]="t('Subir arriba', 'Back to top')" [class.show]="showScrollTop" (click)="scrollToTop()">&#8593;</button>
